name: Build and Push Toko Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: hanifsholihin/toko-jualan:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Deploy and Refresh Image
        run: |
          # 1. Masuk ke sarangnya
          cd ~/runner-websitejualan 
          
          # 2. Tarik image terbaru yang barusan di-push ke Docker Hub
          docker compose pull toko
          
          # 3. Stop dan hapus container lama (biar bener-bener bersih)
          docker compose stop toko
          docker compose rm -f toko
          
          # 4. Nyalain lagi pake image hasil pull tadi
          docker compose up -d toko
          
          # 5. Opsional: Bersihin image lama yang udah gak kepake (biar gak menuhin LXC)
          docker image prune -f